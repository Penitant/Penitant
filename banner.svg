  <rect x="271" y="82" width="8"  height="2"  fill="#1e1e1e"/>
  <rect x="279" y="78" width="16" height="2"  fill="#1e1e1e"/>
  <rect x="279" y="88" width="16" height="2"  fill="#1e1e1e"/>
  <rect x="279" y="78" width="2"  height="12" fill="#1e1e1e"/>
  <rect x="293" y="78" width="2"  height="12" fill="#1e1e1e"/>
  <rect x="281" y="80" width="12" height="8"  fill="#8bc4e8" opacity="0.22"/>
  <rect x="247" y="82" width="10" height="2"  fill="#1e1e1e"/>
  <rect x="295" y="82" width="8"  height="2"  fill="#1e1e1e"/>

  <!-- Nose -->
