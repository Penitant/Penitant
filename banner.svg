  <rect x="266" y="42" width="8" height="4" fill="#2d2d2d"/>
  <rect x="280" y="44" width="6" height="4" fill="#2d2d2d"/>
  <rect x="294" y="48" width="5" height="4" fill="#2d2d2d"/>

  <!-- HEADPHONES -->
  <rect x="236" y="68" width="14" height="18" fill="#2d2d2d"/>
  <rect x="238" y="70" width="10" height="14" fill="#1a1a1a"/>
  <rect x="240" y="72" width="6"  height="10" fill="#383838"/>
