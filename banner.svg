<style>
  .cur { animation: blink 0.95s step-end infinite; animation-delay: 3.3s; opacity: 0; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .sa { animation: tw 2.5s ease-in-out infinite; }
  .sb { animation: tw 3.2s ease-in-out infinite 0.85s; }
  .sc { animation: tw 2.1s ease-in-out infinite 1.65s; }
  @keyframes tw { 0%,100%{opacity:0.9} 50%{opacity:0.12} }
  .led { animation: led 2.5s ease-in-out infinite; }
