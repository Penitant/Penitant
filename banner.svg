<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180" shape-rendering="crispEdges">
<defs>
  <!-- Typewriter clipPaths — each reveals one terminal line -->
  <clipPath id="c1"><rect x="370" y="82" width="0" height="8"><animate attributeName="width" from="0" to="60"  begin="0.3s" dur="0.45s" fill="freeze"/></rect></clipPath>
  <clipPath id="c2"><rect x="370" y="88" width="0" height="8"><animate attributeName="width" from="0" to="88"  begin="0.9s" dur="0.65s" fill="freeze"/></rect></clipPath>
  <clipPath id="c3"><rect x="370" y="94" width="0" height="8"><animate attributeName="width" from="0" to="48"  begin="1.7s" dur="0.35s" fill="freeze"/></rect></clipPath>
  <clipPath id="c4"><rect x="370" y="100" width="0" height="8"><animate attributeName="width" from="0" to="72" begin="2.2s" dur="0.55s" fill="freeze"/></rect></clipPath>
  <clipPath id="c5"><rect x="370" y="106" width="0" height="8"><animate attributeName="width" from="0" to="36" begin="2.9s" dur="0.28s" fill="freeze"/></rect></clipPath>
  <clipPath id="c6"><rect x="370" y="112" width="0" height="8"><animate attributeName="width" from="0" to="56" begin="3.3s" dur="0.42s" fill="freeze"/></rect></clipPath>
  <clipPath id="c7"><rect x="370" y="118" width="0" height="8"><animate attributeName="width" from="0" to="24" begin="3.9s" dur="0.22s" fill="freeze"/></rect></clipPath>
</defs>

<style>
  /* Cursor blink — starts after last line types in */
  .cursor {
    animation: blink 1s step-end infinite;
    animation-delay: 4.3s;
    opacity: 0;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0; }
  }

  /* Star groups — staggered twinkle */
  .sa { animation: tw 2.4s ease-in-out infinite; }
  .sb { animation: tw 3.2s ease-in-out infinite 0.8s; }
  .sc { animation: tw 2.8s ease-in-out infinite 1.5s; }
  .sd { animation: tw 3.6s ease-in-out infinite 0.4s; }
  .se { animation: tw 2.1s ease-in-out infinite 1.1s; }
  @keyframes tw {
    0%,100% { opacity: 0.85; }
    50%      { opacity: 0.1;  }
  }

  /* Screen glow pulse */
  .glow { animation: gp 4s ease-in-out infinite; }
  @keyframes gp {
    0%,100% { opacity: 0.04; }
    50%      { opacity: 0.09; }
  }

  /* Face glow from screen — slight flicker */
  .fglow { animation: fg 5s ease-in-out infinite 0.5s; }
  @keyframes fg {
    0%,100% { opacity: 0.05; }
    40%      { opacity: 0.09; }
    70%      { opacity: 0.03; }
  }
</style>

  <!-- === SKY === -->
  <rect width="800" height="180" fill="#1a0a2e"/>

  <!-- Stars — grouped by twinkle phase -->
  <g class="sa">
    <rect x="40"  y="14" width="3" height="3" fill="#ffffff"/>
    <rect x="590" y="16" width="3" height="3" fill="#ffffff"/>
    <rect x="128" y="32" width="2" height="2" fill="#ffffff"/>
  </g>
  <g class="sb">
    <rect x="88"  y="8"  width="2" height="2" fill="#ffffff"/>
    <rect x="518" y="10" width="2" height="2" fill="#ffffff"/>
    <rect x="686" y="12" width="2" height="2" fill="#ffffff"/>
  </g>
  <g class="sc">
    <rect x="152" y="22" width="3" height="3" fill="#ffffff"/>
    <rect x="446" y="24" width="3" height="3" fill="#ffffff"/>
    <rect x="762" y="20" width="2" height="2" fill="#ffffff"/>
  </g>
  <g class="sd">
    <rect x="214" y="11" width="2" height="2" fill="#ffffff"/>
    <rect x="648" y="6"  width="2" height="2" fill="#ffffff"/>
    <rect x="730" y="35" width="2" height="2" fill="#ffffff"/>
  </g>
  <g class="se">
    <rect x="284" y="18" width="3" height="3" fill="#ffffff"/>
    <rect x="372" y="7"  width="2" height="2" fill="#ffffff"/>
    <rect x="332" y="28" width="2" height="2" fill="#ffffff"/>
  </g>

  <!-- Moon (crescent) -->
  <circle cx="698" cy="30" r="22" fill="#f2e48a"/>
  <circle cx="710" cy="24" r="18" fill="#1a0a2e"/>

  <!-- === CITY SILHOUETTE LEFT === -->
  <rect x="0"   y="90"  width="14" height="90"  fill="#0c0518"/>
  <rect x="0"   y="80"  width="10" height="100" fill="#0c0518"/>
  <rect x="16"  y="104" width="20" height="76"  fill="#0c0518"/>
  <rect x="38"  y="76"  width="28" height="104" fill="#0c0518"/>
  <rect x="68"  y="96"  width="18" height="84"  fill="#0c0518"/>
  <rect x="88"  y="84"  width="16" height="96"  fill="#0c0518"/>
  <rect x="106" y="100" width="14" height="80"  fill="#0c0518"/>
  <!-- Left windows -->
  <rect x="2"  y="84"  width="5" height="4" fill="#f5c842"/>
  <rect x="2"  y="92"  width="5" height="4" fill="#0c0518"/>
  <rect x="2"  y="100" width="5" height="4" fill="#8bc4e8" opacity="0.9"/>
  <rect x="40" y="80"  width="5" height="4" fill="#f5c842"/>
  <rect x="49" y="80"  width="5" height="4" fill="#8bc4e8" opacity="0.9"/>
  <rect x="58" y="80"  width="5" height="4" fill="#f5c842"/>
  <rect x="40" y="88"  width="5" height="4" fill="#8bc4e8" opacity="0.9"/>
  <rect x="49" y="88"  width="5" height="4" fill="#0c0518"/>
  <rect x="58" y="88"  width="5" height="4" fill="#f5c842"/>
  <rect x="40" y="96"  width="5" height="4" fill="#f5c842"/>
  <rect x="90" y="88"  width="5" height="4" fill="#8bc4e8" opacity="0.9"/>
  <rect x="90" y="96"  width="5" height="4" fill="#f5c842"/>

  <!-- === CITY SILHOUETTE RIGHT === -->
  <rect x="648" y="86"  width="22" height="94"  fill="#0c0518"/>
  <rect x="672" y="98"  width="20" height="82"  fill="#0c0518"/>
  <rect x="694" y="72"  width="26" height="108" fill="#0c0518"/>
  <rect x="722" y="88"  width="22" height="92"  fill="#0c0518"/>
  <rect x="746" y="76"  width="24" height="104" fill="#0c0518"/>
  <rect x="772" y="90"  width="28" height="90"  fill="#0c0518"/>
  <!-- Right windows -->
  <rect x="650" y="90"  width="5" height="4" fill="#8bc4e8" opacity="0.9"/>
  <rect x="659" y="90"  width="5" height="4" fill="#f5c842"/>
  <rect x="650" y="98"  width="5" height="4" fill="#f5c842"/>
  <rect x="659" y="98"  width="5" height="4" fill="#0c0518"/>
  <rect x="696" y="76"  width="5" height="4" fill="#f5c842"/>
  <rect x="705" y="76"  width="5" height="4" fill="#8bc4e8" opacity="0.9"/>
  <rect x="696" y="84"  width="5" height="4" fill="#0c0518"/>
  <rect x="705" y="84"  width="5" height="4" fill="#f5c842"/>
  <rect x="748" y="80"  width="5" height="4" fill="#8bc4e8" opacity="0.9"/>
  <rect x="757" y="80"  width="5" height="4" fill="#f5c842"/>
  <rect x="748" y="88"  width="5" height="4" fill="#f5c842"/>
  <rect x="775" y="94"  width="5" height="4" fill="#8bc4e8" opacity="0.9"/>
  <rect x="784" y="94"  width="5" height="4" fill="#f5c842"/>

  <!-- === FLOOR === -->
  <rect x="0" y="154" width="800" height="26" fill="#0e0720"/>

  <!-- === DESK === -->
  <rect x="80"  y="138" width="660" height="16" fill="#5c3a1e"/>
  <rect x="80"  y="138" width="660" height="3"  fill="#7a5030"/>
  <rect x="80"  y="151" width="660" height="3"  fill="#3d2410"/>
  <rect x="108" y="154" width="12"  height="26" fill="#3d2410"/>
  <rect x="700" y="154" width="12"  height="26" fill="#3d2410"/>

  <!-- === LAPTOP === -->
  <!-- Screen bezel -->
  <rect x="358" y="74"  width="150" height="66" fill="#2a2a2a"/>
  <!-- Screen display -->
  <rect x="364" y="79"  width="138" height="56" fill="#0d1117"/>

  <!-- Terminal text — revealed by typewriter clipPaths -->
  <rect x="370" y="85"  width="60" height="3" fill="#00c853" clip-path="url(#c1)"/>
  <rect x="370" y="91"  width="88" height="3" fill="#00c853" clip-path="url(#c2)"/>
  <rect x="370" y="97"  width="48" height="3" fill="#00c853" clip-path="url(#c3)"/>
  <rect x="370" y="103" width="72" height="3" fill="#00c853" clip-path="url(#c4)"/>
  <rect x="370" y="109" width="36" height="3" fill="#00c853" clip-path="url(#c5)"/>
  <rect x="370" y="115" width="56" height="3" fill="#4caf50" clip-path="url(#c6)"/>
  <rect x="370" y="121" width="24" height="3" fill="#4caf50" clip-path="url(#c7)"/>

  <!-- Blinking cursor (appears after typing finishes) -->
  <rect x="396" y="120" width="6" height="8" fill="#00c853" class="cursor"/>

  <!-- Scan line moving across screen -->
  <rect x="364" y="79" width="138" height="2" fill="#00ff41">
    <animate attributeName="y"       values="79;133;133" keyTimes="0;0.85;1" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.13;0.13;0" keyTimes="0;0.05;0.9;1" dur="3.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Hinge -->
  <rect x="350" y="138" width="4" height="4" fill="#1f1f1f"/>
  <rect x="508" y="138" width="4" height="4" fill="#1f1f1f"/>
  <!-- Keyboard base -->
  <rect x="348" y="134" width="168" height="8" fill="#303030"/>
  <rect x="348" y="134" width="168" height="3" fill="#3d3d3d"/>
  <!-- Keys -->
  <rect x="358" y="138" width="3" height="3" fill="#232323"/>
  <rect x="363" y="138" width="3" height="3" fill="#232323"/>
  <rect x="368" y="138" width="3" height="3" fill="#232323"/>
  <rect x="373" y="138" width="3" height="3" fill="#232323"/>
  <rect x="378" y="138" width="3" height="3" fill="#232323"/>
  <rect x="383" y="138" width="3" height="3" fill="#232323"/>
  <rect x="388" y="138" width="3" height="3" fill="#232323"/>
  <rect x="393" y="138" width="3" height="3" fill="#232323"/>
  <rect x="398" y="138" width="3" height="3" fill="#232323"/>
  <rect x="403" y="138" width="3" height="3" fill="#232323"/>
  <rect x="408" y="138" width="3" height="3" fill="#232323"/>
  <rect x="413" y="138" width="3" height="3" fill="#232323"/>
  <rect x="418" y="138" width="3" height="3" fill="#232323"/>
  <rect x="423" y="138" width="3" height="3" fill="#232323"/>
  <rect x="428" y="138" width="3" height="3" fill="#232323"/>
  <rect x="433" y="138" width="3" height="3" fill="#232323"/>
  <rect x="438" y="138" width="3" height="3" fill="#232323"/>
  <rect x="443" y="138" width="3" height="3" fill="#232323"/>
  <rect x="448" y="138" width="3" height="3" fill="#232323"/>
  <rect x="453" y="138" width="3" height="3" fill="#232323"/>
  <rect x="458" y="138" width="3" height="3" fill="#232323"/>
  <rect x="463" y="138" width="3" height="3" fill="#232323"/>
  <rect x="468" y="138" width="3" height="3" fill="#232323"/>
  <rect x="473" y="138" width="3" height="3" fill="#232323"/>
  <rect x="478" y="138" width="3" height="3" fill="#232323"/>
  <rect x="483" y="138" width="3" height="3" fill="#232323"/>
  <rect x="488" y="138" width="3" height="3" fill="#232323"/>
  <rect x="493" y="138" width="3" height="3" fill="#232323"/>
  <rect x="498" y="138" width="3" height="3" fill="#232323"/>
  <!-- Space bar -->
  <rect x="398" y="142" width="68" height="3" fill="#232323"/>

  <!-- === MUG === -->
  <rect x="538" y="116" width="26" height="24" fill="#7b4f2e"/>
  <rect x="538" y="116" width="26" height="4"  fill="#8c5a34"/>
  <rect x="540" y="120" width="22" height="6"  fill="#3d1f08"/>
  <!-- Handle -->
  <rect x="564" y="120" width="6" height="2" fill="#7b4f2e"/>
  <rect x="564" y="132" width="6" height="2" fill="#7b4f2e"/>
  <rect x="568" y="122" width="2" height="10" fill="#7b4f2e"/>

  <!-- Steam wisps — animated with SMIL -->
  <rect x="544" y="112" width="2" height="4" fill="#ffffff">
    <animate attributeName="y"       from="112" to="98"  dur="2s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="0;0.25;0.25;0" keyTimes="0;0.1;0.6;1" dur="2s" repeatCount="indefinite" begin="0s"/>
  </rect>
  <rect x="550" y="112" width="2" height="5" fill="#ffffff">
    <animate attributeName="y"       from="112" to="97"  dur="2s" repeatCount="indefinite" begin="0.55s"/>
    <animate attributeName="opacity" values="0;0.2;0.2;0"  keyTimes="0;0.1;0.6;1" dur="2s" repeatCount="indefinite" begin="0.55s"/>
  </rect>
  <rect x="556" y="112" width="2" height="4" fill="#ffffff">
    <animate attributeName="y"       from="112" to="99"  dur="2s" repeatCount="indefinite" begin="1.1s"/>
    <animate attributeName="opacity" values="0;0.22;0.22;0" keyTimes="0;0.1;0.6;1" dur="2s" repeatCount="indefinite" begin="1.1s"/>
  </rect>
  <rect x="560" y="112" width="2" height="3" fill="#ffffff">
    <animate attributeName="y"       from="112" to="100" dur="2s" repeatCount="indefinite" begin="1.65s"/>
    <animate attributeName="opacity" values="0;0.15;0.15;0" keyTimes="0;0.1;0.6;1" dur="2s" repeatCount="indefinite" begin="1.65s"/>
  </rect>

  <!-- === CHARACTER === -->

  <!-- Hoodie body -->
  <rect x="220" y="108" width="104" height="32" fill="#1a1a2e"/>
  <rect x="270" y="108" width="4"   height="28" fill="#14142a"/>
  <rect x="260" y="104" width="24"  height="10" fill="#111122"/>
  <!-- Arms -->
  <rect x="204" y="116" width="28"  height="16" fill="#1a1a2e"/>
  <rect x="316" y="116" width="52"  height="14" fill="#1a1a2e"/>
  <!-- Hands -->
  <rect x="206" y="128" width="14"  height="10" fill="#c68642"/>
  <rect x="354" y="126" width="16"  height="12" fill="#c68642"/>

  <!-- Neck -->
  <rect x="266" y="100" width="20" height="12" fill="#c68642"/>

  <!-- Head -->
  <rect x="252" y="66" width="44" height="38" fill="#c68642"/>
  <!-- Ears -->
  <rect x="246" y="78" width="8"  height="10" fill="#c68642"/>
  <rect x="247" y="80" width="4"  height="6"  fill="#b5753a"/>
  <rect x="298" y="78" width="8"  height="10" fill="#c68642"/>
  <rect x="299" y="80" width="4"  height="6"  fill="#b5753a"/>

